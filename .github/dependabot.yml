version: 2
updates:
    # Composer = PHP dependencies
    - package-ecosystem: "composer"
      directory: "/"
      schedule:
        interval: "weekly"
      open-pull-requests-limit: 5
      commit-message:
        prefix: "deps"

    #Github Actions = CI/CD workflows
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
        interval: "weekly"
      open-pull-requests-limit: 3
      commit-message:
        prefix: "ci"