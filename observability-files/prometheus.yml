global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrapes Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrapes Node Exporter (your computer's metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
